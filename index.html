<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* 🌌 ESTRELLAS (SIEMPRE ACTIVAS) */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* ✨ POLVO MÁGICO */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ffb3c1;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(1) translate(0,0); opacity: 1; }
    100% { transform: scale(0.5) translate(var(--x), var(--y)); opacity: 0; }
}

/* INTRO */
.intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.intro button {
    padding: 15px 30px;
    background: #ff4d6d;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* CARTA */
.carta {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 1s;
    z-index: 5;
}

.contenido {
    max-width: 700px;
    padding: 40px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

#texto {
    font-size: 20px;
    line-height: 1.6;
    white-space: pre-wrap;
}

/* FINAL */
.final {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    opacity: 0;
    transition: 2s;
    font-size: 18px;
    color: #ffb3c1;
    z-index: 5;
}
</style>
</head>

<body>

<!-- 🌌 ESTRELLAS -->
<div class="stars" id="stars"></div>

<!-- INTRO -->
<div class="intro" id="intro">
    <h1>Hay algo para ti… 💖</h1>
    <button onclick="iniciar(event)">Abrir</button>
</div>

<!-- CARTA -->
<div class="carta" id="carta">
    <div class="contenido">
        <h2>Para ti 💌</h2>
        <p id="texto"></p>
    </div>
</div>

<!-- FINAL -->
<div class="final" id="final">
    Hecho con cariño 💖
</div>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>
const mensaje = `Hey…
Sé que te dije que quería hacerte algo especial… y bueno, aquí está.  
Últimamente he cambiado bastante. He estado pensando más en mí, en mejorar, en ser una mejor versión de mí mismo.  
También quería pedirte perdón si en algún momento fui raro o incómodo. No era mi intención.  
Pero hay algo que sí tengo claro: me gusta hablar contigo.  
Contigo todo se siente diferente… más tranquilo, más bonito.  
Y sí, puede que algunas cosas hayan sido un poco tontas 😅(lo de la cita alfinal era tu prima)  
pero creo que eso también pasa cuando alguien te importa más de lo normal.  
No quiero presionarte, solo me gustaría que podamos seguir hablando… con calma.  
Este pequeño detalle es solo para sacarte una sonrisa  
Si nadie te ha regalado algo así… entonces me alegra ser el primero.  

 Dino Waton 💖`;

/* 🌌 GENERAR ESTRELLAS */
function crearEstrellas() {
    const cont = document.getElementById("stars");
    for (let i = 0; i < 120; i++) {
        const star = document.createElement("div");
        star.classList.add("star");

        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDuration = (Math.random() * 3 + 1) + "s";

        cont.appendChild(star);
    }
}
crearEstrellas();

/* ✨ POLVO MÁGICO SOLO AL ABRIR */
function polvoMagico(x, y) {
    for (let i = 0; i < 25; i++) {
        const spark = document.createElement("div");
        spark.classList.add("sparkle");

        spark.style.left = x + "px";
        spark.style.top = y + "px";

        spark.style.setProperty("--x", (Math.random()*200 - 100) + "px");
        spark.style.setProperty("--y", (Math.random()*200 - 100) + "px");

        document.body.appendChild(spark);

        setTimeout(() => spark.remove(), 1000);
    }
}

function iniciar(e) {
    const rect = e.target.getBoundingClientRect();

    // ✨ efecto mágico en el botón
    polvoMagico(rect.left + rect.width/2, rect.top + rect.height/2);

    document.getElementById("intro").style.display = "none";
    document.getElementById("carta").style.opacity = "1";

    const audio = document.getElementById("musica");
    audio.volume = 0.4;
    audio.play();

    document.getElementById("texto").textContent = mensaje;

    setTimeout(() => {
        document.getElementById("final").style.opacity = "1";
    }, 1500);
}
</script>

</body>
</html>
